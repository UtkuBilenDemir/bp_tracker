server {
    listen 80;
    server_name bp.utkubilen.de;

    # Certbot will add SSL directives here automatically
    # Run: certbot --nginx -d bp.utkubilen.de

    auth_basic "BP Tracker";
    auth_basic_user_file /home/ubd/bp_tracker/data/.htpasswd;

    # Allow larger uploads (phone photos can be 5–10 MB)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;  # allow time for API calls
    }
}
